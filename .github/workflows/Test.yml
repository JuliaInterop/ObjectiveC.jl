name: Test
on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['min', '1', 'pre', 'nightly']
        os: ['macos-14', 'macos-15', 'macos-26']
        include:
          - os: 'macos-15'
            arch: 'x64'
          - os: 'macos-26'
            arch: 'x64'
          - os: 'macos-14'
            arch: 'aarch64'
          - os: 'macos-15'
            arch: 'aarch64'
          - os: 'macos-26'
            arch: 'aarch64'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
          force-arch: true
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
